# ============================================================================
# Watcher MK1 — Nginx Configuration
#
# Place this in /etc/nginx/sites-available/watcher-mk1
# Then: ln -s /etc/nginx/sites-available/watcher-mk1 /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx
# ============================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

server {
    listen 80;
    server_name watcher.hextechsolutions.in;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name watcher.hextechsolutions.in;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/watcher.hextechsolutions.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/watcher.hextechsolutions.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── API Backend ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for AI reasoning (can take 10-30 seconds)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Auth endpoints (stricter rate limit) ───────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend (static files) ────────────────────────────────────────────────
    location / {
        root /opt/watcher-mk1/ui/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Block common attack paths ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    location ~ /(wp-admin|wp-login|xmlrpc|phpmyadmin) {
        return 444;
    }
}
